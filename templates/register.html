{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">🌾</div>
    <h2>Create Account</h2>
    <p class="subtitle">Join OptiCrop and start optimizing your crops</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="POST" action="/register">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="fullname" placeholder="Enter your full name" required/>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" name="password" id="regPwd" placeholder="Create a password" required/>
          <span class="eye-toggle" onclick="togglePwd('regPwd', this)">👁</span>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-wrap">
          <input type="password" name="confirm_password" id="regPwd2" placeholder="Confirm your password" required/>
          <span class="eye-toggle" onclick="togglePwd('regPwd2', this)">👁</span>
        </div>
      </div>
      <button type="submit" class="btn btn-primary full-width" style="margin-top:1rem;">Register</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="/login">Login here</a></p>
  </div>
</div>
{% endblock %}
